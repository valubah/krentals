<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Premium Car Rental Experience">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="K Rentals">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>K Rentals | Drive the Future</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #0F172A;
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    .splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 1s ease-out;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.3));
    }
    .brand-name {
      color: white;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin: 0;
    }
    .loader {
      width: 40px;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      margin-top: 32px;
      position: relative;
      overflow: hidden;
      border-radius: 2px;
    }
    .loader::after {
      content: '';
      position: absolute;
      left: -100%;
      width: 100%;
      height: 100%;
      background: #38BDF8;
      animation: load 2s infinite ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes load {
      0% { left: -100%; }
      50% { left: 0%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <img src="assets/images/logo.png" alt="K Rentals Logo" class="logo">
    <h1 class="brand-name">K RENTALS</h1>
    <div class="loader"></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
